        exigencesSpecifiques.md:
            title: Exigences spécifiques
        ressourcesCDA-struc-gen.md:
            title: CDA
        ressourcesFHIR-struc-gen.md:
            title: FHIR
    enteteDocument.md: 
        title: Entête document
