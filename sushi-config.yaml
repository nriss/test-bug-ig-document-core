# Documentation à propos de cette page : https://fshschool.org/docs/sushi/configuration/

id: ans.document.fr.core
canonical: https://interop.esante.gouv.fr/ig/document/core # the last part of canonical and id must be the same
name: FRDocumentCore # Should be an acronym
title: ANS IG document core
publisher:
  name: Agence du Numérique en Santé (ANS) - 2-10 Rue d'Oradour-sur-Glane, 75015 Paris
  url: https://esante.gouv.fr
status: draft
version: 0.1.0-snapshot # shall conforms to Semantic Versioning https://fr.wiktionary.org/wiki/SemVer
fhirVersion: 4.0.1
copyrightYear: 2020+
releaseLabel: ci-build # le release label doit être conforme au cycle de vie de la doctrine du ci-sis
jurisdiction: urn:iso:std:iso:3166#FR "FRANCE"

parameters: #Parameters list - https://build.fhir.org/ig/FHIR/fhir-tools-ig/CodeSystem-ig-parameters.html
  shownav: 'true'
  excludettl: 'true'
  generate-turtle: 'false'
  generate-json: 'false'
  i18n-default-lang: fr
  i18n-lang:
    - en
  translation-sources:
    - input/translations/en
  path-expansion-params: '../../expansion-params.json'

dependencies:
  hl7.cda.uv.core: 2.0.3-sd
  ans.fr.terminologies: latest
  hl7.fhir.fr.core: 2.1.0
  hl7.fhir.uv.xver-r5.r4: latest
  ans.fhir.fr.annuaire: 1.1.0
  hl7.fhir.uv.fhir-clinical-document: latest
  ihe.pharm.mpd: 1.0.0-comment-2 

pages:
    index.md:
        title: Accueil
    structureGenerale.md:
        title: Structure générale document
